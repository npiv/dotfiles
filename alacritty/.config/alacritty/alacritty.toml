# import = ["~/.config/alacritty/tokyo/night.toml"]
[terminal.shell]
program = "/bin/bash"
#args = ["-l", "-c", "zellij"]

[env]
TERM = "xterm-256color"

[window]
startup_mode = "Maximized"
decorations = "Transparent"
dynamic_padding = true
option_as_alt = "Both"
opacity = 0.9
blur = true

[terminal]
osc52 = "CopyPaste"


[window.padding]
x = 14
y = 14

[font]
size = 16
normal = { family = "Maple Mono NF", style = "Regular" }
bold = { family = "Maple Mono NF", style = "Bold" }
italic = { family = "Maple Mono NF", style = "Italic" }
#family = "JetbrainsMono Nerd Font"
#family = "Cascadia Code NF"
#family = "FiraCode Nerd Font Mono"
#family = "Maple Mono NF"

[general]

live_config_reload = true
import = ["~/.config/alacritty/catppuccin/catppuccin-macchiato.toml"]


